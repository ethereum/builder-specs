Gloas:
  RequestAuth:
    type: object
    description: "Used to authenticate requests to a builder. The message field contains opaque bytes (authorization data) that the validator signs without interpretation. By default, the message field is set to the builder's URL."
    required: [message]
    properties:
      message:
        type: string
        format: binary
        description: "Opaque bytes for authorization. Signed as-is by the validator."
  SignedRequestAuth:
    type: object
    required: [message, signature]
    properties:
      message:
        $ref: "#/Gloas/RequestAuth"
      signature:
        $ref: "../../beacon-apis/types/primitive.yaml#/Signature"