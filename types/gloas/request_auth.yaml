Gloas:
  RequestAuthV1:
    type: object
    required: [builder_url, slot]
    properties:
      builder_url:
        type: string
        description: "The URL of the builder the request is intended for."
        example: "https://builder.example.com"
      slot:
        $ref: "../../beacon-apis/types/primitive.yaml#/Uint64"
        description: "The slot for which the bid is being requested."
  SignedRequestAuthV1:
    type: object
    required: [message, signature]
    properties:
      message:
        $ref: "#/Gloas/RequestAuthV1"
      signature:
        $ref: "../../beacon-apis/types/primitive.yaml#/Signature"