Gloas:
  RequestAuth:
    type: object
    required: [builder_index]
    properties:
      builder_index:
        type: string
        pattern: "^0x[a-fA-F0-9]{1,16}$"
        description: "The on-chain index associated with the builder, represented as a hex string."
  SignedRequestAuth:
    type: object
    required: [message, signature]
    properties:
      message:
        $ref: "#/Gloas/RequestAuth"
      signature:
        $ref: "../../beacon-apis/types/primitive.yaml#/Signature"