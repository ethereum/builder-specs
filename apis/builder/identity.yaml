get:
  operationId: "getBuilderIdentity"
  summary: Get builder identity.
  description: |
    Returns the builder's BLS public key and whether it requires
    `SignedRequestAuth` on requests to the
    [`getExecutionPayloadBid`][get-execution-payload-bid-api] endpoint.
  tags:
    - Builder
  responses:
    "200":
      description: Success response.
      content:
        application/json:
          schema:
            title: GetBuilderIdentityResponse
            type: object
            required: [pubkey, requires_request_auth]
            properties:
              pubkey:
                $ref: "../../beacon-apis/types/primitive.yaml#/Pubkey"
                description: "The builder's BLS public key."
              requires_request_auth:
                type: boolean
                description: "Whether the builder requires a `SignedRequestAuth` on `getExecutionPayloadBid` requests."
                example: false
    "500":
      $ref: "../../builder-oapi.yaml#/components/responses/InternalError"
